name: Restaurant Backend CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # 1. Enter the project directory
            cd /var/www/restaurant/backend

            # 2. Pull the latest code
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # 3. Fresh installation and build
            npm ci
            rm -rf dist
            npm run build

            # 4. Deploy using Ecosystem file
            # 'startOrReload' ensures zero-downtime if running, or starts it if not.
            # '--env production' targets the specific settings in your config.
            pm2 startOrReload ecosystem.config.js --env production

            # 5. Persist the PM2 state
            pm2 save