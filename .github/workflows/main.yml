name: Restaurant Backend CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # 1. Enter the project directory
            cd /var/www/restaurant/backend

            # 2. Hard Reset Git
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # 3. Stop and Delete existing PM2 process to clear memory
            # We use || true so the script doesn't crash if the process isn't running
            pm2 delete restaurant-backend || true

            # 4. Fresh installation and Build
          
            
            npm ci
            rm -rf dist
            npm run build

            # 5. Start a completely fresh process
            pm2 start ecosystem.config.js --env production

            # 6. Persist state
            pm2 save