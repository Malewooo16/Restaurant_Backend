name: Restaurant Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build the application
        run: npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # 1. Enter the project directory
            cd /var/www/restaurant/backend

            # 2. Pull the latest code
            echo "Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # 3. Install dependencies and build
            echo "Installing dependencies..."
            npm ci --prefer-offline --no-audit

            # 4. Generate Prisma Client and run migrations
            echo "Generating Prisma client..."
            npx prisma generate

            echo "Running database migrations..."
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            npx prisma migrate deploy || echo "Migrations completed"

            # 5. Build the application
            echo "Building application..."
            npm run build

            # 6. Restart with PM2 using ecosystem config
            echo "Restarting PM2..."
            pm2 delete apotek-backend || true
            pm2 start ecosystem.config.js --env production
            pm2 save

            # 7. Verify the application is running
            echo "Verifying deployment..."
            sleep 5
            if curl -s http://localhost:3000/api-docs > /dev/null 2>&1; then
              echo "Application is running successfully!"
            else
              echo "Warning: Application may not be responding"
              pm2 logs apotek-backend --lines 20 --nostream
            fi
