name: Restaurant Backend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e  # Exit on any error

            # Go to backend directory
            cd /var/www/restaurant/backend

            # Pull latest changes
            git reset --hard origin/main
            git clean -fd
            git pull origin main

            # Install dependencies
            npm ci

            # Build app
            npm run build

            # Check if PM2 process exists
            if pm2 list | grep -q "restaurant-backend"; then
              # Reload if exists
              pm2 reload restaurant-backend
            else
              # Start if not exists
              pm2 start dist/src/index.js --name restaurant-backend
            fi

            # Save PM2 process list for startup
            pm2 save



